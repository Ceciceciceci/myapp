version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "Deploying pre-built files from build/ (no npm install on Amplify)"
    build:
      commands:
        - test -f build/index.html || (echo "ERROR build/index.html missing — run npm run build locally and push build/" && exit 1)
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
